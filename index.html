<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-body">
        <div class="rows rows1">
            <input type='text' class='input' placeholder='Ввод'>
            <div class="equals">=</div>
        </div>
        <div class="rows">
            <div class="n-seven">7</div>
            <div class="n-eight">8</div>
            <div class="n-nine">9</div>
            <div class="add">+</div>
        </div>
        <div class="rows">
            <div class="n-four">4</div>
            <div class="n-five">5</div>
            <div class="n-six">6</div>
            <div class="sub">-</div>
        </div>
        <div class="rows">
            <div class="n-one">1</div>
            <div class="n-two">2</div>
            <div class="n-three">3</div>
            <div class="mult">*</div>
        </div>
        <div class="rows">
            <div class="clear">Cl</div>
            <div class="n-zero">0</div>
            <div class="dot">.</div>
            <div class="div">/</div>
        </div>
    </div>
    <h3>By Mr.Punch</h3>
</body>
<script src="app.js"></script>
</html>
